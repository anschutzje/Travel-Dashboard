<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tripboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sky:      #5BB8F5;
  --sky-dim:  #3A8CC7;
  --sky-pale: #A8D8F0;
  --text:     #D6EEFF;
  --text-sub: #7BAFD4;
  --muted:    #4A7FA8;
  --dim:      #2A5070;
  --red:      #FF6B6B;
  --glass:    rgba(255,255,255,0.07);
  --glass-hov:rgba(255,255,255,0.11);
  --glass-bdr:rgba(255,255,255,0.14);
  --glass-bdr2:rgba(255,255,255,0.22);
  --radius:   12px;
}

/* ── BACKGROUND ── */
body {
  font-family: 'Inter', sans-serif;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  background: #020B18;
  position: relative;
}

/* ambient gradient orbs */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(90px);
  pointer-events: none;
  z-index: 0;
}
body::before {
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(30,80,160,0.45) 0%, transparent 70%);
  top: -150px; left: -100px;
}
body::after {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(10,60,130,0.35) 0%, transparent 70%);
  bottom: -100px; right: -80px;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 54px;
  border-bottom: 1px solid var(--glass-bdr);
  background: rgba(2,11,24,0.7);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  position: sticky;
  top: 0;
  z-index: 200;
}

.wordmark {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.92rem;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--sky);
}
.wordmark span { color: var(--muted); font-weight: 300; }

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* key status pill */
.key-status {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.05em;
  cursor: pointer;
  padding: 5px 12px;
  border: 1px solid var(--glass-bdr);
  border-radius: 20px;
  background: var(--glass);
  transition: all 0.15s;
  user-select: none;
}
.key-status:hover { border-color: var(--glass-bdr2); background: var(--glass-hov); color: var(--text); }

.key-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
  transition: background 0.2s;
}
.key-dot.active { background: #4ADE80; box-shadow: 0 0 6px rgba(74,222,128,0.6); }

.unit-toggle {
  display: flex;
  border: 1px solid var(--glass-bdr);
  border-radius: 6px;
  overflow: hidden;
  background: var(--glass);
}
.unit-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  font-weight: 500;
  padding: 5px 11px;
  background: transparent;
  color: var(--muted);
  border: none;
  cursor: pointer;
  transition: all 0.12s;
  letter-spacing: 0.06em;
}
.unit-btn.active { background: var(--sky); color: #020B18; font-weight: 600; }

/* ── SETTINGS MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(2,11,24,0.75);
  backdrop-filter: blur(6px);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: rgba(10,28,60,0.92);
  border: 1px solid var(--glass-bdr2);
  border-radius: 14px;
  padding: 28px 28px 24px;
  width: 420px;
  max-width: calc(100vw - 40px);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  animation: modalIn 0.2s ease both;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.96) translateY(8px); }
  to   { opacity: 1; transform: none; }
}

.modal-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--sky);
  margin-bottom: 6px;
}

.modal-sub {
  font-size: 0.78rem;
  color: var(--text-sub);
  line-height: 1.6;
  margin-bottom: 20px;
}
.modal-sub a { color: var(--sky); text-decoration: none; }
.modal-sub a:hover { text-decoration: underline; }

.modal-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.modal-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}
.modal-input {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.82rem;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--glass-bdr2);
  border-radius: 6px;
  color: var(--text);
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.12s, background 0.12s;
  width: 100%;
}
.modal-input:focus { border-color: var(--sky); background: rgba(255,255,255,0.08); }
.modal-input::placeholder { color: var(--dim); }

.modal-hint {
  font-size: 0.7rem;
  color: var(--muted);
  line-height: 1.5;
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.modal-save {
  flex: 1;
  padding: 10px;
  background: var(--sky);
  color: #020B18;
  border: none;
  border-radius: 6px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.12s;
}
.modal-save:hover { background: var(--sky-pale); }

.modal-cancel {
  padding: 10px 18px;
  background: transparent;
  border: 1px solid var(--glass-bdr);
  color: var(--muted);
  border-radius: 6px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.12s;
}
.modal-cancel:hover { color: var(--text); border-color: var(--glass-bdr2); }

.modal-clear {
  padding: 10px 14px;
  background: transparent;
  border: 1px solid rgba(255,107,107,0.25);
  color: rgba(255,107,107,0.6);
  border-radius: 6px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.12s;
}
.modal-clear:hover { border-color: var(--red); color: var(--red); }

/* ── BOARD ── */
.board {
  display: flex;
  gap: 18px;
  padding: 32px 28px 48px;
  overflow-x: auto;
  align-items: flex-start;
  min-height: calc(100vh - 54px);
  scroll-snap-type: x proximity;
  position: relative;
  z-index: 1;
}
.board::-webkit-scrollbar { height: 4px; }
.board::-webkit-scrollbar-track { background: transparent; }
.board::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }
.board::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ── CITY CARD (glass) ── */
.city-card {
  flex-shrink: 0;
  width: 310px;
  scroll-snap-align: start;
  border-radius: var(--radius);
  border: 1px solid var(--glass-bdr2);
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
  animation: slideIn 0.28s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(28px) scale(0.97); }
  to   { opacity: 1; transform: none; }
}

/* card top band */
.card-band {
  background: rgba(255,255,255,0.05);
  border-bottom: 1px solid var(--glass-bdr);
  padding: 16px 16px 13px;
  position: relative;
  overflow: hidden;
}

.card-code {
  position: absolute;
  right: -2px; top: -10px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 4.2rem;
  font-weight: 600;
  color: rgba(255,255,255,0.04);
  letter-spacing: -0.05em;
  line-height: 1;
  pointer-events: none;
  user-select: none;
  text-transform: uppercase;
}

.card-city {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text);
  position: relative;
}

.card-dates {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.67rem;
  color: var(--sky);
  margin-top: 4px;
  letter-spacing: 0.04em;
  position: relative;
}

.card-remove {
  position: absolute;
  top: 11px; right: 11px;
  background: none;
  border: none;
  color: rgba(255,255,255,0.2);
  cursor: pointer;
  font-size: 0.9rem;
  line-height: 1;
  padding: 4px 6px;
  border-radius: 4px;
  transition: color 0.12s, background 0.12s;
  z-index: 2;
}
.card-remove:hover { color: var(--red); background: rgba(255,107,107,0.12); }

/* ── WEATHER ── */
.card-weather {
  padding: 16px;
  border-bottom: 1px solid var(--glass-bdr);
}

.w-current {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 12px;
}
.w-icon { font-size: 2.6rem; line-height: 1; flex-shrink: 0; }
.w-right { flex: 1; }

.w-temp {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 2.5rem;
  font-weight: 600;
  line-height: 1;
  color: var(--sky-pale);
}
.w-temp.flip { animation: numFlip 0.35s steps(7) both; }
@keyframes numFlip { from { opacity: 0.15; } to { opacity: 1; } }

.w-desc {
  font-size: 0.75rem;
  color: var(--text-sub);
  margin-top: 3px;
}

.w-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px 14px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.63rem;
  color: var(--muted);
  margin-bottom: 14px;
}
.w-meta-row { display: flex; align-items: center; gap: 5px; }
.w-meta-val { color: var(--text-sub); }

.forecast {
  display: flex;
  gap: 5px;
  border-top: 1px solid var(--glass-bdr);
  padding-top: 13px;
}
.fc {
  flex: 1;
  text-align: center;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-bdr);
  border-radius: 7px;
  padding: 8px 3px;
}
.fc-day { font-family:'IBM Plex Mono',monospace; font-size:0.54rem; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.fc-ico  { font-size:1.15rem; margin-bottom:3px; }
.fc-hi   { font-family:'IBM Plex Mono',monospace; font-size:0.72rem; font-weight:600; color:var(--sky); }
.fc-lo   { font-family:'IBM Plex Mono',monospace; font-size:0.62rem; color:var(--muted); }

/* ── NEWS ── */
.card-news { padding: 0; }

.news-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px 8px;
  border-bottom: 1px solid var(--glass-bdr);
}
.news-hdr-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}
.news-count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.58rem;
  color: var(--dim);
}

.news-list { padding: 2px 0; }

.news-item {
  display: block;
  padding: 10px 16px;
  border-bottom: 1px solid var(--glass-bdr);
  text-decoration: none;
  color: inherit;
  transition: background 0.1s;
}
.news-item:last-child { border-bottom: none; }
.news-item:hover { background: rgba(255,255,255,0.05); }

.news-title {
  font-size: 0.78rem;
  line-height: 1.45;
  color: var(--text);
  margin-bottom: 4px;
  font-weight: 400;
}
.news-item:hover .news-title { color: var(--sky); }

.news-byline {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.58rem;
  color: var(--muted);
  display: flex;
  gap: 8px;
}
.news-src { color: var(--dim); }

/* ── SKELETON ── */
.sk {
  background: linear-gradient(90deg,
    rgba(255,255,255,0.04) 25%,
    rgba(255,255,255,0.09) 50%,
    rgba(255,255,255,0.04) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 3px;
}
@keyframes shimmer { to { background-position: -200% 0; } }
.sk-line { height: 10px; margin-bottom: 8px; }

/* ── NOTICE / ERROR ── */
.card-notice {
  padding: 14px 16px;
  font-size: 0.75rem;
  line-height: 1.65;
  color: var(--muted);
}
.card-notice.err { color: var(--red); }
.card-notice a { color: var(--sky); text-decoration: none; }
.card-notice a:hover { text-decoration: underline; }

/* ── ADD CARD ── */
.add-card {
  flex-shrink: 0;
  width: 300px;
  scroll-snap-align: start;
  border: 1px dashed rgba(255,255,255,0.12);
  border-radius: var(--radius);
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 22px 20px;
  transition: border-color 0.15s, background 0.15s;
}
.add-card:hover {
  border-color: rgba(91,184,245,0.25);
  background: rgba(91,184,245,0.04);
}

.add-card-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
}

.add-field { display: flex; flex-direction: column; gap: 5px; width: 100%; margin-bottom: 12px; }
.add-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.57rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

.add-input {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.8rem;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  color: var(--text);
  padding: 9px 11px;
  outline: none;
  width: 100%;
  transition: border-color 0.12s, background 0.12s;
}
.add-input:focus { border-color: var(--sky); background: rgba(255,255,255,0.08); }
.add-input::placeholder { color: var(--dim); }
input[type="date"].add-input::-webkit-calendar-picker-indicator {
  filter: invert(0.5) sepia(1) hue-rotate(180deg) saturate(1.5);
  cursor: pointer;
  opacity: 0.7;
}

.add-btn {
  margin-top: 8px;
  width: 100%;
  padding: 10px;
  background: var(--sky);
  color: #020B18;
  border: none;
  border-radius: 6px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.12s, transform 0.1s;
}
.add-btn:hover { background: var(--sky-pale); }
.add-btn:active { transform: scale(0.98); }

.add-err {
  font-size: 0.68rem;
  color: var(--red);
  margin-top: 4px;
  font-family: 'IBM Plex Mono', monospace;
  min-height: 14px;
}

/* ── EMPTY STATE ── */
.board-empty {
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 64px 0 0 2px;
  pointer-events: none;
  user-select: none;
}
.be-line {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.68rem;
  color: var(--dim);
  letter-spacing: 0.05em;
}
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <div class="wordmark">TRIP<span>BOARD</span></div>
  <div class="header-right">
    <div class="key-status" id="key-status" onclick="openModal()">
      <div class="key-dot" id="key-dot"></div>
      <span id="key-label">News API key</span>
    </div>
    <div class="unit-toggle">
      <button class="unit-btn active" id="btn-f" onclick="setUnit('F')">°F</button>
      <button class="unit-btn" id="btn-c" onclick="setUnit('C')">°C</button>
    </div>
  </div>
</header>

<!-- ══ SETTINGS MODAL ══ -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">// News API Key</div>
    <p class="modal-sub">
      Headlines are powered by <a href="https://gnews.io/register" target="_blank">GNews</a>
      — free tier gives 100 requests/day, no credit card required. Sign up takes about 60 seconds.
      Your key is saved locally in this browser only.
    </p>
    <div class="modal-field">
      <label class="modal-label">GNews API Key</label>
      <input class="modal-input" type="text" id="modal-key-input"
        placeholder="e.g. a1b2c3d4e5f6789…" autocomplete="off" spellcheck="false">
    </div>
    <p class="modal-hint" id="modal-hint"></p>
    <div class="modal-actions">
      <button class="modal-save" onclick="saveKey()">Save &amp; apply</button>
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-clear" onclick="clearKey()" title="Remove saved key">Clear</button>
    </div>
  </div>
</div>

<!-- ══ BOARD ══ -->
<div class="board" id="board">

  <div class="board-empty" id="board-empty">
    <div class="be-line">// no destinations added</div>
    <div class="be-line">// add a city using the form →</div>
  </div>

  <!-- ADD card -->
  <div class="add-card" id="add-card">
    <div class="add-card-title">// add destination</div>

    <div class="add-field">
      <label class="add-label">City</label>
      <input class="add-input" type="text" id="add-city" placeholder="Nashville, Tokyo, Rome…">
    </div>
    <div class="add-field">
      <label class="add-label">Arrival</label>
      <input class="add-input" type="date" id="add-from">
    </div>
    <div class="add-field">
      <label class="add-label">Departure (optional)</label>
      <input class="add-input" type="date" id="add-to">
    </div>

    <div class="add-err" id="add-err"></div>
    <button class="add-btn" onclick="addCard()">Add to board</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let tempUnit = 'F';
let gnewsKey = '';
let cards = [];

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
(function init() {
  // Load saved key first — before restoring cards
  gnewsKey = localStorage.getItem('gnews_key') || '';
  updateKeyStatus();

  // Default arrival = today
  document.getElementById('add-from').value = toDateStr(new Date());

  // Restore saved cards
  try {
    const saved = JSON.parse(localStorage.getItem('tripboard_cards') || '[]');
    saved.forEach(c => addCardFromData(c, false));
  } catch(e) {}

  // Enter on city field
  document.getElementById('add-city').addEventListener('keydown', e => {
    if (e.key === 'Enter') addCard();
  });

  // ESC closes modal
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
})();

// ─────────────────────────────────────────────
//  API KEY MODAL
// ─────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-key-input').value = gnewsKey;
  document.getElementById('modal-hint').textContent = '';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('modal-key-input').focus(), 60);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function saveKey() {
  const val = document.getElementById('modal-key-input').value.trim();
  const hint = document.getElementById('modal-hint');

  if (!val) {
    hint.style.color = 'var(--red)';
    hint.textContent = 'Enter a key, or use Clear to remove the saved one.';
    return;
  }
  if (val.length < 16) {
    hint.style.color = 'var(--red)';
    hint.textContent = 'That looks too short — double-check the key.';
    return;
  }

  gnewsKey = val;
  localStorage.setItem('gnews_key', val);
  updateKeyStatus();
  closeModal();

  // Reload news on all existing cards with the new key
  cards.forEach(c => loadNews(c.id, c.resolvedName || c.city));
}

function clearKey() {
  gnewsKey = '';
  localStorage.removeItem('gnews_key');
  document.getElementById('modal-key-input').value = '';
  updateKeyStatus();
  // Update all cards to show "no key" notice
  cards.forEach(c => {
    const el = document.getElementById(`cn-${c.id}`);
    if (el) el.innerHTML = noKeyNotice();
  });
  closeModal();
}

function updateKeyStatus() {
  const dot   = document.getElementById('key-dot');
  const label = document.getElementById('key-label');
  if (gnewsKey) {
    dot.classList.add('active');
    label.textContent = 'News key active';
  } else {
    dot.classList.remove('active');
    label.textContent = 'Add news API key';
  }
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function toDateStr(d) { return d.toISOString().split('T')[0]; }

function fmtDate(str) {
  if (!str) return '';
  return new Date(str + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function cityCode(name) {
  return (name || '').replace(/,.*/, '').trim().substring(0, 3).toUpperCase();
}

function timeAgo(iso) {
  if (!iso) return '';
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 2) return 'just now';
  if (m < 60) return `${m}m ago`;
  if (m < 1440) return `${Math.floor(m/60)}h ago`;
  return `${Math.floor(m/1440)}d ago`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtTemp(f, unit) {
  const n = parseFloat(f);
  if (isNaN(n)) return '--';
  return unit === 'F' ? Math.round(n) + '°' : Math.round((n-32)*5/9) + '°';
}

function descToIcon(desc) {
  const s = (desc||'').toLowerCase();
  if (s.includes('thunder') || s.includes('storm'))         return '⛈️';
  if (s.includes('blizzard'))                                return '🌨️';
  if (s.includes('snow') || s.includes('sleet'))            return '❄️';
  if (s.includes('freezing'))                                return '🌨️';
  if (s.includes('heavy rain') || s.includes('torrential')) return '🌧️';
  if (s.includes('drizzle') || s.includes('light rain') || s.includes('patchy rain')) return '🌦️';
  if (s.includes('rain') || s.includes('shower'))           return '🌧️';
  if (s.includes('fog') || s.includes('mist') || s.includes('haze')) return '🌫️';
  if (s.includes('overcast'))                                return '☁️';
  if (s.includes('cloudy'))                                  return '🌤️';
  if (s.includes('partly') || s.includes('partial'))        return '⛅';
  if (s.includes('sunny') || s.includes('clear'))           return '☀️';
  return '🌡️';
}

function saveCards() {
  const slim = cards.map(c => ({ id: c.id, city: c.city, from: c.from, to: c.to }));
  localStorage.setItem('tripboard_cards', JSON.stringify(slim));
}

function updateEmptyState() {
  document.getElementById('board-empty').style.display = cards.length ? 'none' : 'flex';
}

function noKeyNotice() {
  return `<div class="card-notice">
    Headlines need a <span style="color:var(--sky);cursor:pointer" onclick="openModal()">GNews API key</span>
    — click the pill in the header to add one. Free, takes ~60 sec.
  </div>`;
}

function skeletonWeather() {
  return `<div style="padding:14px 0 4px">
    <div class="sk sk-line" style="width:42%;height:30px;margin-bottom:10px"></div>
    <div class="sk sk-line" style="width:60%"></div>
    <div class="sk sk-line" style="width:45%"></div>
  </div>`;
}
function skeletonNews() {
  return `<div style="padding:12px 16px">
    <div class="sk sk-line" style="width:85%"></div>
    <div class="sk sk-line" style="width:55%"></div>
    <div class="sk sk-line" style="width:78%;margin-top:10px"></div>
    <div class="sk sk-line" style="width:62%"></div>
  </div>`;
}

// ─────────────────────────────────────────────
//  ADD CARD
// ─────────────────────────────────────────────
function addCard() {
  const city  = document.getElementById('add-city').value.trim();
  const from  = document.getElementById('add-from').value;
  const to    = document.getElementById('add-to').value;
  const errEl = document.getElementById('add-err');
  errEl.textContent = '';

  if (!city) { errEl.textContent = '// city is required'; return; }
  if (!from) { errEl.textContent = '// arrival date is required'; return; }
  if (to && to < from) { errEl.textContent = '// departure must be after arrival'; return; }

  const data = { id: Date.now(), city, from, to };
  addCardFromData(data, true);

  document.getElementById('add-city').value = '';
  document.getElementById('add-to').value = '';
  document.getElementById('add-city').focus();
}

function addCardFromData(data, scrollTo = false) {
  const entry = { ...data, resolvedName: data.city, weatherData: null };
  cards.push(entry);
  saveCards();
  updateEmptyState();

  const cardEl = buildCardDOM(entry);
  const board  = document.getElementById('board');
  board.insertBefore(cardEl, document.getElementById('add-card'));

  if (scrollTo) {
    setTimeout(() => cardEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' }), 50);
  }

  loadWeather(entry.id, entry.city);
  loadNews(entry.id, entry.city);
}

// ─────────────────────────────────────────────
//  BUILD CARD DOM
// ─────────────────────────────────────────────
function buildCardDOM(entry) {
  const el = document.createElement('div');
  el.className = 'city-card';
  el.dataset.id = entry.id;

  const dateLabel = (entry.to && entry.to !== entry.from)
    ? `${fmtDate(entry.from)} → ${fmtDate(entry.to)}`
    : fmtDate(entry.from);

  el.innerHTML = `
    <div class="card-band">
      <div class="card-code" id="cc-${entry.id}">${cityCode(entry.city)}</div>
      <div class="card-city" id="ccity-${entry.id}">${esc(entry.city)}</div>
      <div class="card-dates">${esc(dateLabel)}</div>
      <button class="card-remove" onclick="removeCard(${entry.id})" title="Remove">✕</button>
    </div>
    <div class="card-weather" id="cw-${entry.id}">${skeletonWeather()}</div>
    <div class="card-news"    id="cn-${entry.id}">${skeletonNews()}</div>
  `;
  return el;
}

// ─────────────────────────────────────────────
//  REMOVE CARD
// ─────────────────────────────────────────────
function removeCard(id) {
  cards = cards.filter(c => c.id !== id);
  saveCards();
  updateEmptyState();
  const el = document.querySelector(`.city-card[data-id="${id}"]`);
  if (el) {
    el.style.transition = 'opacity 0.2s, transform 0.2s';
    el.style.opacity = '0';
    el.style.transform = 'scale(0.95)';
    setTimeout(() => el.remove(), 220);
  }
}

// ─────────────────────────────────────────────
//  WEATHER — wttr.in
// ─────────────────────────────────────────────
async function loadWeather(id, city) {
  const el = document.getElementById(`cw-${id}`);
  if (!el) return;
  try {
    const r = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();

    // Resolve location name
    const area = d.nearest_area?.[0];
    if (area) {
      const rc = area.areaName?.[0]?.value || city;
      const rr = area.region?.[0]?.value   || '';
      const rn = area.country?.[0]?.value  || '';
      const full = [rc, rr, rn].filter(Boolean).join(', ');
      const cityEl = document.getElementById(`ccity-${id}`);
      const codeEl = document.getElementById(`cc-${id}`);
      if (cityEl) cityEl.textContent = full;
      if (codeEl) codeEl.textContent = cityCode(rc);
      const entry = cards.find(c => c.id === id);
      if (entry) { entry.resolvedName = full; entry.weatherData = d; }
    }

    el.innerHTML = renderWeather(d, tempUnit);
    const tempEl = el.querySelector('.w-temp');
    if (tempEl) { tempEl.classList.remove('flip'); void tempEl.offsetWidth; tempEl.classList.add('flip'); }
  } catch(e) {
    el.innerHTML = `<div class="card-notice err">⚠ ${esc(e.message)}<br>
      <span style="font-size:0.68rem;color:var(--muted)">Check the city name.</span></div>`;
  }
}

function renderWeather(d, unit) {
  const cur   = d.current_condition?.[0];
  const daily = d.weather || [];
  if (!cur) return `<div class="card-notice err">No data.</div>`;

  const desc  = cur.weatherDesc?.[0]?.value || '';
  const fcHTML = daily.slice(0,3).map(day => {
    const dt    = new Date(day.date + 'T12:00:00');
    const fdesc = day.hourly?.[4]?.weatherDesc?.[0]?.value || '';
    return `<div class="fc">
      <div class="fc-day">${dt.toLocaleDateString('en-US',{weekday:'short'})}</div>
      <div class="fc-ico">${descToIcon(fdesc)}</div>
      <div class="fc-hi">${fmtTemp(day.maxtempF, unit)}</div>
      <div class="fc-lo">${fmtTemp(day.mintempF, unit)}</div>
    </div>`;
  }).join('');

  return `
    <div class="w-current">
      <div class="w-icon">${descToIcon(desc)}</div>
      <div class="w-right">
        <div class="w-temp flip">${fmtTemp(cur.temp_F, unit)}</div>
        <div class="w-desc">${esc(desc)}</div>
      </div>
    </div>
    <div class="w-meta">
      <div class="w-meta-row">💧 <span class="w-meta-val">${cur.humidity}%</span></div>
      <div class="w-meta-row">💨 <span class="w-meta-val">${cur.windspeedMiles} mph</span></div>
      <div class="w-meta-row">🌡 <span class="w-meta-val">feels ${fmtTemp(cur.FeelsLikeF, unit)}</span></div>
      <div class="w-meta-row">👁 <span class="w-meta-val">${cur.visibility} km</span></div>
    </div>
    <div class="forecast">${fcHTML}</div>`;
}

// ─────────────────────────────────────────────
//  NEWS — GNews  (reads global gnewsKey)
// ─────────────────────────────────────────────
async function loadNews(id, city) {
  const el = document.getElementById(`cn-${id}`);
  if (!el) return;

  if (!gnewsKey) { el.innerHTML = noKeyNotice(); return; }

  el.innerHTML = skeletonNews();

  try {
    const q   = encodeURIComponent(city);
    const url = `https://gnews.io/api/v4/search?q=${q}&lang=en&max=6&apikey=${encodeURIComponent(gnewsKey)}`;
    const r   = await fetch(url);
    const d   = await r.json();

    if (d.errors) throw new Error(Array.isArray(d.errors) ? d.errors.join(', ') : JSON.stringify(d.errors));

    const articles = d.articles || [];
    if (!articles.length) {
      el.innerHTML = `<div class="card-notice">// no recent headlines found</div>`;
      return;
    }

    el.innerHTML = `
      <div class="news-hdr">
        <span class="news-hdr-label">// headlines</span>
        <span class="news-count">${articles.length} stories</span>
      </div>
      <div class="news-list">
        ${articles.map(a => `
          <a class="news-item" href="${esc(a.url)}" target="_blank" rel="noopener">
            <div class="news-title">${esc(a.title)}</div>
            <div class="news-byline">
              <span class="news-src">${esc(a.source?.name||'')}</span>
              <span>${timeAgo(a.publishedAt)}</span>
            </div>
          </a>`).join('')}
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="card-notice err">⚠ ${esc(e.message)}</div>`;
  }
}

// ─────────────────────────────────────────────
//  UNIT TOGGLE
// ─────────────────────────────────────────────
function setUnit(unit) {
  tempUnit = unit;
  document.getElementById('btn-f').classList.toggle('active', unit === 'F');
  document.getElementById('btn-c').classList.toggle('active', unit === 'C');
  cards.forEach(c => {
    if (c.weatherData) {
      const el = document.getElementById(`cw-${c.id}`);
      if (el) el.innerHTML = renderWeather(c.weatherData, unit);
    }
  });
}
</script>
