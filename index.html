<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tripboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #060D1F;
  --surface:  #0D1A35;
  --surface2: #112040;
  --border:   #1A3060;
  --border2:  #1F3D7A;
  --amber:    #4D9FE8;
  --amber-dim:#1A3F6B;
  --text:     #7EC8F5;
  --muted:    #3A6B9A;
  --dim:      #1E3F66;
  --red:      #E05C5C;
  --green:    #4CAF7D;
  --radius:   8px;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 52px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 200;
}

.wordmark {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.92rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--amber);
}

.wordmark span {
  color: var(--muted);
  font-weight: 300;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
}

.unit-toggle {
  display: flex;
  border: 1px solid var(--border2);
  border-radius: 4px;
  overflow: hidden;
}

.unit-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  font-weight: 500;
  padding: 5px 10px;
  background: transparent;
  color: var(--muted);
  border: none;
  cursor: pointer;
  transition: all 0.12s;
  letter-spacing: 0.05em;
}
.unit-btn.active { background: var(--amber); color: var(--bg); }

.gnews-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}

.gnews-label {
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.04em;
  white-space: nowrap;
}

.gnews-input {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--text);
  padding: 5px 10px;
  width: 200px;
  outline: none;
  transition: border-color 0.12s;
}
.gnews-input:focus { border-color: var(--amber); }
.gnews-input::placeholder { color: var(--dim); }

/* ── BOARD (horizontal scroll) ── */
.board {
  display: flex;
  gap: 16px;
  padding: 28px 28px 40px;
  overflow-x: auto;
  align-items: flex-start;
  min-height: calc(100vh - 52px);
  scroll-snap-type: x proximity;
}

.board::-webkit-scrollbar { height: 5px; }
.board::-webkit-scrollbar-track { background: var(--surface); }
.board::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.board::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ── CITY CARD ── */
.city-card {
  flex-shrink: 0;
  width: 300px;
  scroll-snap-align: start;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  overflow: hidden;
  animation: slideIn 0.25s ease both;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(24px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* card top band */
.card-band {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 12px;
  position: relative;
  overflow: hidden;
}

/* large city code watermark */
.card-code {
  position: absolute;
  right: -4px;
  top: -8px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 4rem;
  font-weight: 600;
  color: var(--border2);
  letter-spacing: -0.05em;
  line-height: 1;
  pointer-events: none;
  user-select: none;
  text-transform: uppercase;
}

.card-city {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text);
  position: relative;
}

.card-dates {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.68rem;
  color: var(--amber);
  margin-top: 3px;
  letter-spacing: 0.04em;
  position: relative;
}

.card-remove {
  position: absolute;
  top: 10px;
  right: 10px;
  background: none;
  border: none;
  color: var(--dim);
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  padding: 4px;
  border-radius: 3px;
  transition: color 0.12s, background 0.12s;
  z-index: 2;
}
.card-remove:hover { color: var(--red); background: rgba(224,92,92,0.1); }

/* ── WEATHER SECTION ── */
.card-weather {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.w-current {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}

.w-icon { font-size: 2.4rem; line-height: 1; flex-shrink: 0; }

.w-right { flex: 1; }

.w-temp {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 2.4rem;
  font-weight: 600;
  line-height: 1;
  color: var(--amber);
  /* flip animation on load */
}

.w-temp.flip {
  animation: numFlip 0.4s steps(8) both;
}
@keyframes numFlip {
  from { opacity: 0.2; }
  to   { opacity: 1; }
}

.w-desc {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 2px;
  font-weight: 400;
}

.w-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  margin-bottom: 14px;
}

.w-meta-row { display: flex; align-items: center; gap: 5px; }
.w-meta-val { color: var(--text); }

/* forecast */
.forecast {
  display: flex;
  gap: 4px;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}

.fc {
  flex: 1;
  text-align: center;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 7px 3px;
}

.fc-day {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.55rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}
.fc-ico  { font-size: 1.1rem; margin-bottom: 3px; }
.fc-hi   { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; font-weight: 600; color: var(--amber); }
.fc-lo   { font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem; color: var(--muted); }

/* ── NEWS SECTION ── */
.card-news { padding: 0; }

.news-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px 8px;
  border-bottom: 1px solid var(--border);
}

.news-hdr-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}

.news-count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.6rem;
  color: var(--dim);
}

.news-list { padding: 4px 0; }

.news-item {
  display: block;
  padding: 9px 16px;
  border-bottom: 1px solid var(--border);
  text-decoration: none;
  color: inherit;
  transition: background 0.1s;
  cursor: pointer;
}
.news-item:last-child { border-bottom: none; }
.news-item:hover { background: var(--surface2); }

.news-title {
  font-size: 0.78rem;
  line-height: 1.45;
  color: var(--text);
  margin-bottom: 4px;
  font-weight: 400;
}
.news-item:hover .news-title { color: var(--amber); }

.news-byline {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  display: flex;
  gap: 8px;
}

.news-src { color: var(--dim); }
.news-age { color: var(--muted); }

/* ── SKELETON ── */
.sk {
  background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 3px;
}
@keyframes shimmer { to { background-position: -200% 0; } }
.sk-line { height: 10px; margin-bottom: 8px; }

/* ── ERROR / NOTICE ── */
.card-notice {
  padding: 14px 16px;
  font-size: 0.75rem;
  line-height: 1.6;
  color: var(--muted);
}
.card-notice.err { color: var(--red); background: rgba(224,92,92,0.06); }
.card-notice a { color: var(--amber); text-decoration: none; }
.card-notice a:hover { text-decoration: underline; }

/* ── ADD CARD ── */
.add-card {
  flex-shrink: 0;
  width: 300px;
  scroll-snap-align: start;
  border: 1px dashed var(--border2);
  border-radius: var(--radius);
  background: transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 24px 20px;
  gap: 0;
  transition: border-color 0.15s, background 0.15s;
  cursor: default;
}
.add-card:hover {
  border-color: var(--amber-dim);
  background: rgba(232,168,56,0.03);
}

.add-card-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
  width: 100%;
}

.add-field { display: flex; flex-direction: column; gap: 5px; width: 100%; margin-bottom: 12px; }

.add-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

.add-input {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.8rem;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--text);
  padding: 8px 10px;
  outline: none;
  width: 100%;
  transition: border-color 0.12s;
}
.add-input:focus { border-color: var(--amber); }
.add-input::placeholder { color: var(--dim); }
input[type="date"].add-input::-webkit-calendar-picker-indicator {
  filter: invert(0.4);
  cursor: pointer;
}

.add-btn {
  margin-top: 8px;
  width: 100%;
  padding: 10px;
  background: var(--amber);
  color: var(--bg);
  border: none;
  border-radius: 4px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.12s, transform 0.1s;
}
.add-btn:hover { background: #f0b840; }
.add-btn:active { transform: scale(0.98); }

.add-err {
  font-size: 0.7rem;
  color: var(--red);
  margin-top: 6px;
  font-family: 'IBM Plex Mono', monospace;
  min-height: 16px;
}

/* ── EMPTY BOARD STATE ── */
.board-empty {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  padding: 60px 0 0 4px;
  gap: 6px;
  pointer-events: none;
  user-select: none;
}

.be-line {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  color: var(--dim);
  letter-spacing: 0.06em;
}
.be-line.hi { color: var(--border2); font-size: 0.65rem; }
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <div class="wordmark">TRIP<span>BOARD</span></div>
  <div class="header-right">
    <div class="gnews-wrap">
      <span class="gnews-label">GNEWS KEY</span>
      <input class="gnews-input" type="password" id="gnews-key" placeholder="optional — gnews.io">
    </div>
    <div class="unit-toggle">
      <button class="unit-btn active" id="btn-f" onclick="setUnit('F')">°F</button>
      <button class="unit-btn" id="btn-c" onclick="setUnit('C')">°C</button>
    </div>
  </div>
</header>

<!-- ══ BOARD ══ -->
<div class="board" id="board">

  <!-- empty state hint (hidden once a card is added) -->
  <div class="board-empty" id="board-empty">
    <div class="be-line">// no destinations added yet</div>
    <div class="be-line hi">// use the form to the right →</div>
  </div>

  <!-- ADD card — always last -->
  <div class="add-card" id="add-card">
    <div class="add-card-title">// add destination</div>

    <div class="add-field">
      <label class="add-label">City</label>
      <input class="add-input" type="text" id="add-city" placeholder="Nashville, Tokyo, Rome…">
    </div>

    <div class="add-field">
      <label class="add-label">Arrival</label>
      <input class="add-input" type="date" id="add-from">
    </div>

    <div class="add-field">
      <label class="add-label">Departure (optional)</label>
      <input class="add-input" type="date" id="add-to">
    </div>

    <div class="add-err" id="add-err"></div>
    <button class="add-btn" onclick="addCard()">Add to board</button>
  </div>

</div><!-- /board -->

<script>
// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let tempUnit = 'F';

// cards[]: { id, city, from, to, resolvedName, weatherData }
let cards = [];

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
(function init() {
  const key = localStorage.getItem('gnews_key');
  if (key) document.getElementById('gnews-key').value = key;

  // default arrival = today
  const today = new Date();
  document.getElementById('add-from').value = toDateStr(today);

  // restore saved cards
  try {
    const saved = JSON.parse(localStorage.getItem('tripboard_cards') || '[]');
    saved.forEach(c => addCardFromData(c));
  } catch(e) {}

  // Enter key on city field
  document.getElementById('add-city').addEventListener('keydown', e => {
    if (e.key === 'Enter') addCard();
  });

  // Save GNews key on blur
  document.getElementById('gnews-key').addEventListener('blur', () => {
    const v = document.getElementById('gnews-key').value.trim();
    if (v) localStorage.setItem('gnews_key', v);
  });
})();

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function toDateStr(d) { return d.toISOString().split('T')[0]; }

function fmtDate(str) {
  if (!str) return '';
  return new Date(str + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function cityCode(name) {
  // 3-letter code from first word
  return name.replace(/,.*/, '').trim().substring(0, 3).toUpperCase();
}

function timeAgo(iso) {
  if (!iso) return '';
  const ms = Date.now() - new Date(iso);
  const m = Math.floor(ms / 60000);
  if (m < 2)  return 'just now';
  if (m < 60) return `${m}m ago`;
  if (m < 1440) return `${Math.floor(m/60)}h ago`;
  return `${Math.floor(m/1440)}d ago`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtTemp(f, unit) {
  const n = parseFloat(f);
  if (isNaN(n)) return '--';
  if (unit === 'F') return Math.round(n) + '°';
  return Math.round((n - 32) * 5/9) + '°';
}

function descToIcon(desc) {
  const s = (desc||'').toLowerCase();
  if (s.includes('thunder') || s.includes('storm'))    return '⛈️';
  if (s.includes('blizzard'))                           return '🌨️';
  if (s.includes('snow') || s.includes('sleet'))       return '❄️';
  if (s.includes('freezing'))                           return '🌨️';
  if (s.includes('heavy rain') || s.includes('torrential')) return '🌧️';
  if (s.includes('drizzle') || s.includes('light rain') || s.includes('patchy rain')) return '🌦️';
  if (s.includes('rain') || s.includes('shower'))      return '🌧️';
  if (s.includes('fog') || s.includes('mist') || s.includes('haze')) return '🌫️';
  if (s.includes('overcast'))                           return '☁️';
  if (s.includes('cloudy'))                             return '🌤️';
  if (s.includes('partly') || s.includes('partial'))   return '⛅';
  if (s.includes('sunny') || s.includes('clear'))      return '☀️';
  return '🌡️';
}

function savecards() {
  const slim = cards.map(c => ({ id: c.id, city: c.city, from: c.from, to: c.to }));
  localStorage.setItem('tripboard_cards', JSON.stringify(slim));
}

function updateEmptyState() {
  document.getElementById('board-empty').style.display =
    cards.length === 0 ? 'flex' : 'none';
}

// ─────────────────────────────────────────────
//  ADD CARD (from UI)
// ─────────────────────────────────────────────
function addCard() {
  const city = document.getElementById('add-city').value.trim();
  const from = document.getElementById('add-from').value;
  const to   = document.getElementById('add-to').value;
  const errEl = document.getElementById('add-err');
  errEl.textContent = '';

  if (!city) { errEl.textContent = '// city is required'; return; }
  if (!from) { errEl.textContent = '// arrival date is required'; return; }
  if (to && to < from) { errEl.textContent = '// departure must be after arrival'; return; }

  const data = { id: Date.now(), city, from, to };
  addCardFromData(data);

  // reset form
  document.getElementById('add-city').value = '';
  document.getElementById('add-to').value = '';
  document.getElementById('add-city').focus();
}

function addCardFromData(data) {
  const entry = { ...data, resolvedName: data.city, weatherData: null };
  cards.push(entry);
  savecards();
  updateEmptyState();

  // Build DOM
  const card = buildCardDOM(entry);
  const board = document.getElementById('board');
  const addCard = document.getElementById('add-card');
  board.insertBefore(card, addCard);

  // scroll to new card
  setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' }), 50);

  // Load data
  const key = document.getElementById('gnews-key').value.trim();
  loadWeather(entry.id, entry.city);
  loadNews(entry.id, entry.city, key);
}

// ─────────────────────────────────────────────
//  BUILD CARD DOM
// ─────────────────────────────────────────────
function buildCardDOM(entry) {
  const el = document.createElement('div');
  el.className = 'city-card';
  el.dataset.id = entry.id;

  const dateLabel = entry.to && entry.to !== entry.from
    ? `${fmtDate(entry.from)} → ${fmtDate(entry.to)}`
    : fmtDate(entry.from);

  el.innerHTML = `
    <div class="card-band">
      <div class="card-code">${cityCode(entry.city)}</div>
      <div class="card-city">${esc(entry.city)}</div>
      <div class="card-dates">${esc(dateLabel)}</div>
      <button class="card-remove" onclick="removeCard(${entry.id})" title="Remove">✕</button>
    </div>
    <div class="card-weather" id="cw-${entry.id}">${skeletonWeather()}</div>
    <div class="card-news" id="cn-${entry.id}">${skeletonNews()}</div>
  `;
  return el;
}

function skeletonWeather() {
  return `<div style="padding:14px 0 4px">
    <div class="sk sk-line" style="width:40%;height:32px;margin-bottom:10px"></div>
    <div class="sk sk-line" style="width:65%"></div>
    <div class="sk sk-line" style="width:50%"></div>
  </div>`;
}

function skeletonNews() {
  return `<div style="padding:12px 16px">
    <div class="sk sk-line" style="width:80%"></div>
    <div class="sk sk-line" style="width:55%"></div>
    <div class="sk sk-line" style="width:75%;margin-top:10px"></div>
    <div class="sk sk-line" style="width:60%"></div>
  </div>`;
}

// ─────────────────────────────────────────────
//  REMOVE CARD
// ─────────────────────────────────────────────
function removeCard(id) {
  cards = cards.filter(c => c.id !== id);
  savecards();
  const el = document.querySelector(`.city-card[data-id="${id}"]`);
  if (el) {
    el.style.transition = 'opacity 0.2s, transform 0.2s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(-16px)';
    setTimeout(() => el.remove(), 220);
  }
  updateEmptyState();
}

// ─────────────────────────────────────────────
//  WEATHER — wttr.in
// ─────────────────────────────────────────────
async function loadWeather(id, city) {
  const el = document.getElementById(`cw-${id}`);
  if (!el) return;
  try {
    const r = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();

    // Update resolved name + card code
    const area = d.nearest_area?.[0];
    if (area) {
      const resolvedCity    = area.areaName?.[0]?.value || city;
      const resolvedCountry = area.country?.[0]?.value || '';
      const resolvedRegion  = area.region?.[0]?.value  || '';
      const full = [resolvedCity, resolvedRegion, resolvedCountry].filter(Boolean).join(', ');
      const card = document.querySelector(`.city-card[data-id="${id}"]`);
      if (card) {
        card.querySelector('.card-city').textContent = full;
        card.querySelector('.card-code').textContent = cityCode(resolvedCity);
      }
      const entry = cards.find(c => c.id === id);
      if (entry) { entry.resolvedName = full; entry.weatherData = d; }
    }

    el.innerHTML = renderWeather(d, tempUnit);
    // flip animation on temp
    const tempEl = el.querySelector('.w-temp');
    if (tempEl) { tempEl.classList.remove('flip'); void tempEl.offsetWidth; tempEl.classList.add('flip'); }

  } catch(e) {
    el.innerHTML = `<div class="card-notice err">⚠ ${esc(e.message)}<br>
      <span style="color:var(--muted);font-size:0.68rem">Check the city name and try again.</span></div>`;
  }
}

function renderWeather(d, unit) {
  const cur   = d.current_condition?.[0];
  const daily = d.weather || [];
  if (!cur) return `<div class="card-notice err">No weather data.</div>`;

  const desc = cur.weatherDesc?.[0]?.value || '';
  const icon = descToIcon(desc);
  const wind = cur.windspeedMiles;
  const hum  = cur.humidity;
  const feels = cur.FeelsLikeF;
  const vis  = cur.visibility;

  const fcHTML = daily.slice(0,3).map(day => {
    const dt = new Date(day.date + 'T12:00:00');
    const fdesc = day.hourly?.[4]?.weatherDesc?.[0]?.value || '';
    return `<div class="fc">
      <div class="fc-day">${dt.toLocaleDateString('en-US',{weekday:'short'})}</div>
      <div class="fc-ico">${descToIcon(fdesc)}</div>
      <div class="fc-hi">${fmtTemp(day.maxtempF, unit)}</div>
      <div class="fc-lo">${fmtTemp(day.mintempF, unit)}</div>
    </div>`;
  }).join('');

  return `
    <div class="w-current">
      <div class="w-icon">${icon}</div>
      <div class="w-right">
        <div class="w-temp flip">${fmtTemp(cur.temp_F, unit)}</div>
        <div class="w-desc">${esc(desc)}</div>
      </div>
    </div>
    <div class="w-meta">
      <div class="w-meta-row">💧 <span class="w-meta-val">${hum}%</span></div>
      <div class="w-meta-row">💨 <span class="w-meta-val">${wind} mph</span></div>
      <div class="w-meta-row">🌡 <span class="w-meta-val">feels ${fmtTemp(feels, unit)}</span></div>
      <div class="w-meta-row">👁 <span class="w-meta-val">${vis} km</span></div>
    </div>
    <div class="forecast">${fcHTML}</div>
  `;
}

// ─────────────────────────────────────────────
//  NEWS — GNews
// ─────────────────────────────────────────────
async function loadNews(id, city, key) {
  const el = document.getElementById(`cn-${id}`);
  if (!el) return;

  if (!key) {
    el.innerHTML = `<div class="card-notice">
      // headlines require a free
      <a href="https://gnews.io/register" target="_blank">GNews key</a>
      — paste it in the header above.
    </div>`;
    return;
  }

  try {
    const q = encodeURIComponent(`"${city}"`);
    const url = `https://gnews.io/api/v4/search?q=${q}&lang=en&max=6&apikey=${encodeURIComponent(key)}`;
    const r = await fetch(url);
    const d = await r.json();
    if (d.errors) throw new Error(d.errors.join(', '));

    const articles = d.articles || [];
    if (!articles.length) {
      el.innerHTML = `<div class="card-notice">// no recent headlines found</div>`;
      return;
    }

    el.innerHTML = `
      <div class="news-hdr">
        <span class="news-hdr-label">// headlines</span>
        <span class="news-count">${articles.length} stories</span>
      </div>
      <div class="news-list">
        ${articles.map(a => `
          <a class="news-item" href="${esc(a.url)}" target="_blank" rel="noopener">
            <div class="news-title">${esc(a.title)}</div>
            <div class="news-byline">
              <span class="news-src">${esc(a.source?.name||'')}</span>
              <span class="news-age">${timeAgo(a.publishedAt)}</span>
            </div>
          </a>
        `).join('')}
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="card-notice err">⚠ News: ${esc(e.message)}</div>`;
  }
}

// ─────────────────────────────────────────────
//  UNIT TOGGLE — re-render all weather
// ─────────────────────────────────────────────
function setUnit(unit) {
  tempUnit = unit;
  document.getElementById('btn-f').classList.toggle('active', unit === 'F');
  document.getElementById('btn-c').classList.toggle('active', unit === 'C');
  cards.forEach(c => {
    if (c.weatherData) {
      const el = document.getElementById(`cw-${c.id}`);
      if (el) el.innerHTML = renderWeather(c.weatherData, unit);
    }
  });
}
</script>
